<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00897b"/>
      <stop offset="50%" style="stop-color:#26a69a"/>
      <stop offset="100%" style="stop-color:#4db6ac"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff8a65"/>
      <stop offset="100%" style="stop-color:#ffab91"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" rx="0"/>
  
  <!-- Decorative waves -->
  <path d="M0 480 Q150 440 300 470 Q450 500 600 460 Q750 420 900 470 Q1050 520 1200 460 L1200 630 L0 630 Z" fill="rgba(255,255,255,0.1)"/>
  <path d="M0 520 Q200 490 400 510 Q600 530 800 500 Q1000 470 1200 510 L1200 630 L0 630 Z" fill="rgba(255,255,255,0.08)"/>
  
  <!-- Sun -->
  <circle cx="1020" cy="120" r="60" fill="#ffeb3b" opacity="0.9"/>
  <circle cx="1020" cy="120" r="45" fill="#fff9c4" opacity="0.6"/>
  
  <!-- Palm tree silhouettes -->
  <g transform="translate(80, 80)" opacity="0.15">
    <rect x="40" y="100" width="12" height="350" rx="6" fill="#fff"/>
    <ellipse cx="20" cy="100" rx="80" ry="20" fill="#fff" transform="rotate(-20,20,100)"/>
    <ellipse cx="80" cy="90" rx="70" ry="18" fill="#fff" transform="rotate(15,80,90)"/>
    <ellipse cx="46" cy="70" rx="60" ry="16" fill="#fff" transform="rotate(-5,46,70)"/>
  </g>
  
  <!-- Main content area -->
  <text x="600" y="180" text-anchor="middle" font-family="-apple-system, PingFang SC, Microsoft YaHei, sans-serif" font-size="80" font-weight="800" fill="#ffffff">🌴 普吉岛之旅 🏖️</text>
  
  <!-- Divider line -->
  <rect x="400" y="220" width="400" height="4" rx="2" fill="url(#accent)"/>
  
  <!-- Date -->
  <text x="600" y="300" text-anchor="middle" font-family="-apple-system, PingFang SC, Microsoft YaHei, sans-serif" font-size="42" font-weight="600" fill="rgba(255,255,255,0.95)">📅 2026年6月3日 — 6月6日</text>
  
  <!-- Subtitle -->
  <text x="600" y="370" text-anchor="middle" font-family="-apple-system, PingFang SC, Microsoft YaHei, sans-serif" font-size="32" fill="rgba(255,255,255,0.75)">阳光 · 沙滩 · 海浪 · 4天3晚</text>
  
  <!-- Flight badges -->
  <g transform="translate(320, 420)">
    <rect width="140" height="48" rx="24" fill="rgba(255,255,255,0.2)"/>
    <text x="70" y="32" text-anchor="middle" font-family="-apple-system, PingFang SC, sans-serif" font-size="22" fill="#fff">✈️ 广州分队</text>
  </g>
  <g transform="translate(740, 420)">
    <rect width="140" height="48" rx="24" fill="rgba(255,255,255,0.2)"/>
    <text x="70" y="32" text-anchor="middle" font-family="-apple-system, PingFang SC, sans-serif" font-size="22" fill="#fff">✈️ 杭州分队</text>
  </g>
  
  <!-- Bottom tagline -->
  <text x="600" y="560" text-anchor="middle" font-family="-apple-system, PingFang SC, Microsoft YaHei, sans-serif" font-size="24" fill="rgba(255,255,255,0.5)">dessons.github.io/phuket-trip-2026</text>
</svg>
